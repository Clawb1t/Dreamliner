    replaceDefaultOverrides: false
    config:
      confirm_actions: true
      confirm_actions_expiry: 0
      mute_role: "1111111111111111111"
      case_log_channel: "1111111111111111111"
      reason_edit_level: 100
      duration_edit_level: 100
      ban_delete_message_days: 0
      softban_delete_message_days: 7
      notify:
