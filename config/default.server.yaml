# Default server configuration for Dreamliner.
# Download via /config template, edit, then upload via /config upload.
# Only include keys you want to override - missing keys inherit these defaults.

emojis:
  success: "<:checked:1524379445379465276>"
  error: "<:redcheck:1524379423757959208>"
  neutral: "<:greycheck:1524379394372669553>"
  warning: "<:lowwarning:1524379341000151170>"
  unchecked: "<:unchecked:1524379366996312104>"

# Map role or user snowflakes to permission levels (higher = more access).
# `levels: {}` is empty. To add entries, replace with indented keys (no braces):
# levels:
#   "ROLE_OR_USER_ID": 100
#   "ROLE_OR_USER_ID": 50
levels: {}

# Server events: joins, leaves, edits, deletes, voice activity, role/nickname changes
server_log_channel_id: "1111111111111111111"

# Moderation: infractions, automod, censor, /clean, voice mod, cases, expirations
moderation_log_channel_id: "1111111111111111111"

# When true, command replies are only visible to the user who ran the command.
ephemeral_responses: false

plugins:
  utility:
    enabled: true
    replaceDefaultOverrides: false
    config:
      jumbo_size: 128
      autojoin_threads: true
      info_on_single_result: true
      can_search: false
      can_clean: false
      can_userinfo: false
      can_server: false
      can_channelinfo: false
      can_messageinfo: false
      can_inviteinfo: false
      can_roleinfo: false
      can_emojiinfo: false
      can_snowflake: false
      can_roles: false
      can_level: false
      can_context: false
      can_source: false
      can_nickname: false
      can_vcmove: false
      can_vckick: false
      can_ping: false
      can_about: false
      can_help: false
      can_reload_guild: false
      can_avatar: false
      can_jumbo: false
      can_info: false
      can_time: false
    overrides:
      - level: ">=50"
        config:
          can_search: true
          can_clean: true
          can_userinfo: true
          can_server: true
          can_channelinfo: true
          can_messageinfo: true
          can_inviteinfo: true
          can_roleinfo: true
          can_emojiinfo: true
          can_snowflake: true
          can_roles: true
          can_level: true
          can_context: true
          can_source: true
          can_nickname: true
          can_vcmove: true
          can_vckick: true
          can_help: true
